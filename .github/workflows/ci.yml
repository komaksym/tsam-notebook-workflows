name: CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: ["**"]

jobs:
  conventional-commits:
    name: Conventional commits
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install

      - name: Install Commitizen
        run: uv sync --locked --only-group commit

      - name: Check PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: uv run --no-sync cz check --message "$PR_TITLE"

      - name: Check commit messages
        if: github.event_name == 'pull_request' || github.event.before != '0000000000000000000000000000000000000000'
        env:
          BASE_COMMIT: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: uv run --no-sync cz check --rev-range "$BASE_COMMIT..$HEAD_COMMIT"

  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check src/tsam_workflows tests src/approach_1_ALL.ipynb

      - name: Type check
        run: uv run mypy src/tsam_workflows

      - name: Test
        run: uv run pytest

      - name: Execute grouped notebook
        run: uv run pytest --nbmake src/approach_1_ALL.ipynb

      - name: CLI help
        run: uv run tsam-workflows grouped --help

      - name: Build package
        run: uv build
